<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Analytics Dashboard</title>
<style>

    
body{
font-family:Arial;
margin:40px;
background:#f4f4f4;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#4CAF50;
color:white;
}

tr:nth-child(even){
background:#f9f9f9;
}

</style>

</head>

<body>

    <form action="/dashboard" method="get" style="margin-bottom:20px;">

        <input
                type="text"
                name="search"
                placeholder="Search by Short Code or URL"
                style="padding:10px;width:300px;">

        <button type="submit">
            Search
        </button>

    </form>
    
    <div style="margin-bottom:20px;">

        <a href="/dashboard">
        <button>Newest</button>
        </a>

        <a href="/dashboard?sort=clicks">
        <button>Most Clicked</button>
        </a>

        <a href="/dashboard?sort=least">
        <button>Least Clicked</button>
        </a>

    </div>

<h1>URL Analytics Dashboard</h1>
<h2>Project Statistics</h2>
<div style="display:flex;gap:20px;margin-bottom:30px;">
<div style="background:#4CAF50;color:white;padding:20px;border-radius:10px;width:200px;text-align:center;">
<h3>Total URLs</h3>
<h1 th:text="${totalUrls}"></h1>
</div>
<div style="background:#2196F3;color:white;padding:20px;border-radius:10px;width:200px;text-align:center;">
<h3>Total Clicks</h3>
<h1 th:text="${totalClicks}"></h1>
</div>
</div>



<h2>Top 5 Most Visited URLs</h2>
<table>
    <tr>
    <th>Rank</th>
    <th>Short Code</th>
    <th>Clicks</th>
    </tr>
        <tr th:each="url, stat : ${topUrls}">
        <td th:text="${stat.count}"></td>
        <td th:text="${url.shortCode}"></td>
        <td th:text="${url.clickCount}"></td>
    </tr>
</table>
<br><br>



<table>
    <tr>
    <th>Short Code</th>
    <th>Original URL</th>
    <th>Clicks</th>
    <th>Created</th>
    <th>Last Accessed</th>
    </tr>

    <tr th:each="url : ${urls}">
    <td th:text="${url.shortCode}"></td>
    <td th:text="${url.originalUrl}"></td>
    <td th:text="${url.clickCount}"></td>
    <td th:text="${#temporals.format(url.createdAt,'yyyy-MM-dd HH:mm')}"></td>

    <td>
    <span
    th:if="${url.lastAccessed!=null}"
    th:text="${#temporals.format(url.lastAccessed,'yyyy-MM-dd HH:mm')}">
    </span>

    <span
    th:if="${url.lastAccessed==null}">
    Never
    </span>

    </td>
    </tr>
</table>

</body>
</html>
